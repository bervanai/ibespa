<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloserCRM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #04070f;
            --s1: rgba(255, 255, 255, .035);
            --s2: rgba(255, 255, 255, .06);
            --rim: rgba(255, 255, 255, .08);
            --rim2: rgba(255, 255, 255, .14);
            --blue: #3b82f6;
            --green: #10b981;
            --amber: #f59e0b;
            --red: #ef4444;
            --violet: #8b5cf6;
            --t1: #eef2ff;
            --t2: #7a8baa;
            --t3: #3a4560;
            --sw: 240px;
            --r: 14px;
            --rs: 9px;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--t1);
            min-height: 100vh;
            font-size: 14px;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: radial-gradient(rgba(255, 255, 255, .03) 1px, transparent 1px);
            background-size: 24px 24px;
            pointer-events: none;
            z-index: 0
        }

        #login-page,
        #app,
        #modal-overlay,
        #toast-c {
            position: relative;
            z-index: 1
        }

        h1,
        h2,
        h3,
        h4 {
            font-family: 'Sora', sans-serif
        }

        ::-webkit-scrollbar {
            width: 4px;
            height: 4px
        }

        ::-webkit-scrollbar-track {
            background: transparent
        }

        ::-webkit-scrollbar-thumb {
            background: var(--rim2);
            border-radius: 4px
        }

        /* ANIMATIONS */
        @keyframes fUp {
            from {
                opacity: 0;
                transform: translateY(14px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        @keyframes toastIn {
            from {
                transform: translateX(110%);
                opacity: 0
            }

            to {
                transform: translateX(0);
                opacity: 1
            }
        }

        @keyframes toastOut {
            from {
                opacity: 1;
                transform: translateX(0)
            }

            to {
                opacity: 0;
                transform: translateX(110%)
            }
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(.96)
            }

            to {
                opacity: 1;
                transform: scale(1)
            }
        }

        .e1 {
            animation: fUp .3s cubic-bezier(.16, 1, .3, 1) .04s both
        }

        .e2 {
            animation: fUp .3s cubic-bezier(.16, 1, .3, 1) .08s both
        }

        .e3 {
            animation: fUp .3s cubic-bezier(.16, 1, .3, 1) .13s both
        }

        .e4 {
            animation: fUp .3s cubic-bezier(.16, 1, .3, 1) .18s both
        }

        .e5 {
            animation: fUp .3s cubic-bezier(.16, 1, .3, 1) .23s both
        }

        /* TOAST */
        #toast-c {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none
        }

        .toast {
            background: rgba(10, 16, 28, .96);
            backdrop-filter: blur(12px);
            border: 1px solid var(--rim2);
            border-left: 3px solid var(--blue);
            padding: 12px 18px;
            border-radius: 11px;
            font-size: 13px;
            font-weight: 500;
            box-shadow: 0 10px 32px rgba(0, 0, 0, .5);
            animation: toastIn .3s cubic-bezier(.16, 1, .3, 1) both;
            max-width: 320px;
            pointer-events: auto
        }

        .toast.ok {
            border-left-color: var(--green)
        }

        .toast.err {
            border-left-color: var(--red)
        }

        .toast.out {
            animation: toastOut .25s ease forwards
        }

        /* LOGIN */
        #login-page {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
            background: radial-gradient(ellipse 70% 60% at 20% 20%, rgba(59, 130, 246, .08), transparent 55%), radial-gradient(ellipse 60% 50% at 80% 80%, rgba(139, 92, 246, .07), transparent 55%)
        }

        .login-card {
            background: rgba(10, 16, 30, .9);
            border: 1px solid var(--rim);
            border-radius: 20px;
            padding: 44px 40px;
            width: 100%;
            max-width: 430px;
            box-shadow: 0 32px 80px rgba(0, 0, 0, .7)
        }

        .login-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 32px
        }

        .login-mark {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--blue), var(--violet));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px
        }

        .login-wordmark {
            font-family: 'Sora', sans-serif;
            font-size: 20px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #8baad0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent
        }

        .login-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 6px
        }

        .login-sub {
            font-size: 13px;
            color: var(--t2);
            margin-bottom: 28px
        }

        .err-box {
            background: rgba(239, 68, 68, .09);
            border: 1px solid rgba(239, 68, 68, .2);
            color: #f87171;
            border-radius: var(--rs);
            padding: 10px 13px;
            font-size: 13px;
            margin-bottom: 14px
        }

        .sep {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--t3);
            font-size: 11px;
            margin: 20px 0
        }

        .sep::before,
        .sep::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--rim)
        }

        /* FORMS */
        .fg {
            margin-bottom: 13px
        }

        .fg label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: var(--t2);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: .4px
        }

        .fg input,
        .fg select,
        .fg textarea {
            width: 100%;
            background: rgba(255, 255, 255, .04);
            border: 1px solid var(--rim);
            border-radius: var(--rs);
            color: var(--t1);
            padding: 11px 14px;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: border-color .15s, box-shadow .15s
        }

        .fg input:focus,
        .fg select:focus,
        .fg textarea:focus {
            border-color: var(--blue);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, .13)
        }

        .fg select option {
            background: #0a1020
        }

        .fg textarea {
            resize: vertical;
            min-height: 80px
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px
        }

        /* DEMO BTNS */
        .demo-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 12px;
            background: rgba(255, 255, 255, .025);
            border: 1px solid var(--rim);
            border-radius: var(--rs);
            cursor: pointer;
            margin-bottom: 6px;
            transition: border-color .15s, background .15s;
            width: 100%;
            text-align: left
        }

        .demo-btn:hover {
            border-color: var(--blue);
            background: rgba(59, 130, 246, .06)
        }

        .dav {
            width: 34px;
            height: 34px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
            flex-shrink: 0;
            font-family: 'Sora', sans-serif
        }

        .dn {
            font-size: 13px;
            font-weight: 600
        }

        .dr {
            font-size: 11px;
            color: var(--t2)
        }

        .dc {
            font-size: 10px;
            color: var(--t3);
            font-family: monospace
        }

        /* BUTTONS */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 9px 17px;
            border-radius: var(--rs);
            border: none;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            font-family: inherit;
            transition: all .15s;
            white-space: nowrap
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--blue), #2563eb);
            color: #fff;
            box-shadow: 0 3px 16px rgba(59, 130, 246, .28)
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 22px rgba(59, 130, 246, .4)
        }

        .btn-full {
            width: 100%;
            justify-content: center;
            padding: 12px;
            font-size: 14px
        }

        .btn-ghost {
            background: rgba(255, 255, 255, .04);
            color: var(--t2);
            border: 1px solid var(--rim)
        }

        .btn-ghost:hover {
            background: rgba(255, 255, 255, .08);
            border-color: var(--rim2);
            color: var(--t1)
        }

        .btn-sec {
            background: rgba(255, 255, 255, .06);
            color: var(--t1);
            border: 1px solid var(--rim)
        }

        .btn-sec:hover {
            background: rgba(255, 255, 255, .10)
        }

        .btn-red {
            background: rgba(239, 68, 68, .1);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, .18)
        }

        .btn-red:hover {
            background: rgba(239, 68, 68, .18)
        }

        .btn-green {
            background: rgba(16, 185, 129, .1);
            color: #34d399;
            border: 1px solid rgba(16, 185, 129, .18)
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
            border-radius: 7px
        }

        .btn-xs {
            padding: 4px 9px;
            font-size: 11px;
            border-radius: 6px
        }

        /* APP LAYOUT */
        #app {
            display: flex;
            min-height: 100vh
        }

        /* SIDEBAR */
        .sidebar {
            width: var(--sw);
            background: rgba(4, 7, 15, .95);
            border-right: 1px solid var(--rim);
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            overflow-y: auto;
            z-index: 200
        }

        .sidebar::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 2px;
            background: linear-gradient(180deg, transparent, var(--blue) 30%, var(--violet) 70%, transparent);
            opacity: .5
        }

        .sb-logo {
            padding: 20px 18px 15px;
            border-bottom: 1px solid var(--rim);
            display: flex;
            align-items: center;
            gap: 10px
        }

        .sb-mark {
            width: 34px;
            height: 34px;
            background: linear-gradient(135deg, var(--blue), var(--violet));
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 17px;
            flex-shrink: 0
        }

        .sb-wordmark {
            font-family: 'Sora', sans-serif;
            font-size: 15px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #8ba8cf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent
        }

        .sb-user {
            padding: 12px 16px;
            border-bottom: 1px solid var(--rim);
            display: flex;
            align-items: center;
            gap: 10px
        }

        .sb-av {
            width: 34px;
            height: 34px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 700;
            flex-shrink: 0;
            font-family: 'Sora', sans-serif
        }

        .sb-uname {
            font-size: 13px;
            font-weight: 600
        }

        .sb-urole {
            font-size: 11px;
            color: var(--t2);
            margin-top: 1px
        }

        .sb-nav {
            flex: 1;
            padding: 10px 9px;
            display: flex;
            flex-direction: column;
            gap: 1px
        }

        .sb-sec {
            font-size: 10px;
            font-weight: 700;
            color: var(--t3);
            text-transform: uppercase;
            letter-spacing: .8px;
            padding: 10px 9px 4px;
            margin-top: 2px
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 9px;
            padding: 8px 11px;
            border-radius: var(--rs);
            cursor: pointer;
            color: var(--t2);
            font-size: 13px;
            font-weight: 500;
            transition: all .13s;
            position: relative
        }

        .nav-item:hover {
            background: var(--s2);
            color: var(--t1)
        }

        .nav-item.active {
            background: rgba(59, 130, 246, .1);
            color: var(--blue);
            font-weight: 600
        }

        .nav-item.active::before {
            content: '';
            position: absolute;
            left: -9px;
            top: 4px;
            bottom: 4px;
            width: 3px;
            background: linear-gradient(var(--blue), var(--violet));
            border-radius: 0 3px 3px 0
        }

        .nav-icon {
            font-size: 16px;
            width: 20px;
            text-align: center;
            flex-shrink: 0
        }

        .sb-footer {
            padding: 12px 9px;
            border-top: 1px solid var(--rim)
        }

        /* MAIN */
        .main {
            flex: 1;
            margin-left: var(--sw);
            min-height: 100vh;
            display: flex;
            flex-direction: column
        }

        .topbar {
            background: rgba(4, 7, 15, .85);
            border-bottom: 1px solid var(--rim);
            padding: 12px 26px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(16px)
        }

        .topbar-title {
            font-family: 'Sora', sans-serif;
            font-size: 16px;
            font-weight: 700
        }

        .topbar-acts {
            display: flex;
            align-items: center;
            gap: 7px
        }

        .ca {
            padding: 24px 26px;
            flex: 1
        }

        /* STAT CARDS */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 18px
        }

        .stat-card {
            background: var(--s1);
            border: 1px solid var(--rim);
            border-radius: var(--r);
            padding: 20px 18px;
            position: relative;
            overflow: hidden;
            transition: border-color .18s, transform .18s
        }

        .stat-card:hover {
            border-color: var(--rim2);
            transform: translateY(-2px)
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--cc, var(--blue)), transparent)
        }

        .stat-card.blue {
            --cc: var(--blue)
        }

        .stat-card.green {
            --cc: var(--green)
        }

        .stat-card.amber {
            --cc: var(--amber)
        }

        .stat-card.violet {
            --cc: var(--violet)
        }

        .sc-icon {
            font-size: 24px;
            margin-bottom: 12px;
            display: block
        }

        .sc-val {
            font-family: 'Sora', sans-serif;
            font-size: 30px;
            font-weight: 800;
            letter-spacing: -1px;
            display: block;
            margin-bottom: 3px
        }

        .stat-card.blue .sc-val {
            color: var(--blue)
        }

        .stat-card.green .sc-val {
            color: var(--green)
        }

        .stat-card.amber .sc-val {
            color: var(--amber)
        }

        .stat-card.violet .sc-val {
            color: var(--violet)
        }

        .sc-lbl {
            font-size: 12px;
            color: var(--t2);
            font-weight: 500
        }

        .sc-sub {
            font-size: 11px;
            color: var(--t3);
            margin-top: 6px
        }

        /* CHARTS ROW */
        .charts-row {
            display: grid;
            grid-template-columns: 3fr 2fr;
            gap: 12px;
            margin-bottom: 18px
        }

        .chart-card {
            background: var(--s1);
            border: 1px solid var(--rim);
            border-radius: var(--r);
            padding: 18px 20px
        }

        .cc-title {
            font-size: 11px;
            font-weight: 700;
            color: var(--t3);
            text-transform: uppercase;
            letter-spacing: .7px;
            margin-bottom: 14px
        }

        canvas {
            display: block;
            max-width: 100%
        }

        /* TABLE CARD */
        .tc {
            background: var(--s1);
            border: 1px solid var(--rim);
            border-radius: var(--r);
            overflow: hidden
        }

        .th {
            padding: 13px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            border-bottom: 1px solid var(--rim);
            flex-wrap: wrap
        }

        .th h3 {
            font-size: 14px;
            font-weight: 600
        }

        .sbox {
            background: rgba(255, 255, 255, .04);
            border: 1px solid var(--rim);
            border-radius: 7px;
            color: var(--t1);
            padding: 7px 12px;
            font-size: 13px;
            font-family: inherit;
            outline: none;
            width: 200px;
            transition: border-color .15s
        }

        .sbox:focus {
            border-color: var(--blue)
        }

        .fsel {
            background: rgba(255, 255, 255, .04);
            border: 1px solid var(--rim);
            border-radius: 7px;
            color: var(--t1);
            padding: 7px 11px;
            font-size: 13px;
            font-family: inherit;
            outline: none;
            cursor: pointer
        }

        .fsel option {
            background: #0a1020
        }

        .tabs-row {
            display: flex;
            gap: 2px;
            padding: 9px 16px;
            border-bottom: 1px solid var(--rim);
            overflow-x: auto
        }

        .tab {
            padding: 5px 12px;
            border-radius: 7px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            color: var(--t2);
            border: none;
            background: none;
            font-family: inherit;
            white-space: nowrap;
            transition: all .13s
        }

        .tab:hover {
            background: var(--s2);
            color: var(--t1)
        }

        .tab.active {
            background: rgba(59, 130, 246, .14);
            color: var(--blue);
            font-weight: 600
        }

        .tw {
            overflow-x: auto
        }

        table {
            width: 100%;
            border-collapse: collapse
        }

        th {
            padding: 9px 14px;
            text-align: left;
            font-size: 11px;
            font-weight: 700;
            color: var(--t3);
            text-transform: uppercase;
            letter-spacing: .4px;
            background: rgba(255, 255, 255, .02);
            border-bottom: 1px solid var(--rim)
        }

        td {
            padding: 12px 14px;
            border-bottom: 1px solid var(--rim);
            font-size: 13px
        }

        tr:last-child td {
            border-bottom: none
        }

        tr:hover td {
            background: rgba(255, 255, 255, .02)
        }

        .ln {
            font-weight: 600
        }

        .le {
            font-size: 11px;
            color: var(--t2);
            margin-top: 1px
        }

        .chip {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 2px 7px 2px 3px;
            background: rgba(255, 255, 255, .04);
            border: 1px solid var(--rim);
            border-radius: 20px;
            font-size: 12px
        }

        .chav {
            width: 20px;
            height: 20px;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            font-weight: 700;
            font-family: 'Sora', sans-serif
        }

        .qa {
            display: flex;
            gap: 5px;
            align-items: center
        }

        .qa-btn {
            width: 26px;
            height: 26px;
            border-radius: 6px;
            background: rgba(255, 255, 255, .04);
            border: 1px solid var(--rim);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            cursor: pointer;
            transition: all .13s;
            text-decoration: none;
            color: var(--t2)
        }

        .qa-btn:hover {
            background: rgba(59, 130, 246, .1);
            border-color: var(--blue);
            color: var(--blue)
        }

        .qa-btn.wa:hover {
            background: rgba(37, 211, 102, .1);
            border-color: #25D366;
            color: #25D366
        }

        /* BADGES */
        .badge {
            display: inline-flex;
            align-items: center;
            padding: 2px 9px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            font-family: 'Sora', sans-serif;
            white-space: nowrap
        }

        .b-nuevo {
            background: rgba(100, 116, 148, .1);
            color: #8a9dc0;
            border: 1px solid rgba(100, 116, 148, .14)
        }

        .b-contactado {
            background: rgba(59, 130, 246, .11);
            color: #60a5fa;
            border: 1px solid rgba(59, 130, 246, .18)
        }

        .b-no_contesta {
            background: rgba(245, 158, 11, .11);
            color: #fbbf24;
            border: 1px solid rgba(245, 158, 11, .18)
        }

        .b-en_proceso {
            background: rgba(139, 92, 246, .11);
            color: #a78bfa;
            border: 1px solid rgba(139, 92, 246, .18)
        }

        .b-cerrado {
            background: rgba(16, 185, 129, .11);
            color: #34d399;
            border: 1px solid rgba(16, 185, 129, .18)
        }

        .b-no_interesado {
            background: rgba(239, 68, 68, .11);
            color: #f87171;

                const pad = n => String(n).padStart(2, '0');
                return `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}T${pad(d.getHours())}${pad(d.getMinutes())}00`;

        function downloadTemplate() {
            const csv = 'nombre,apellidos,empresa,telefono,email,tipo,tipo_negocio,presupuesto,fuente,notas\nJuan,García,TechCorp SL,600111222,juan@ejemplo.com,caliente,saas,5000,Web,Muy interesado\nMaría,López,López & Asoc.,611222333,maria@ejemplo.com,tibio,servicios,2000,Referido,\nCarlos,Ruiz,Ruiz Retail,622333444,carlos@ejemplo.com,frio,retail,800,Ads,';

        function handleCSVDrop(e) {
            e.preventDefault(); document.getElementById('csv-drop').classList.remove('over');
            const file = e.dataTransfer.files[0]; if (file) handleCSVFile(file);
        }

        function handleCSVFile(file) {
            if (!file) { return }
            if (!file.name.toLowerCase().endsWith('.csv')) { showCSVResult('err', 'Solo se aceptan archivos .csv'); return }
            const reader = new FileReader();
            reader.onload = ev => { parseCSV(ev.target.result) };
            reader.readAsText(file, 'UTF-8');
        }

        function parseCSV(text) {
            // Normalize line endings and split
            const lines = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n').filter(l => l.trim());
            if (lines.length < 2) { showCSVResult('err', 'El CSV está vacío o solo tiene cabecera'); return }

            // Parse header
            const header = parseCSVLine(lines[0]).map(h => h.toLowerCase().trim().replace(/[^a-záéíóúñ_]/gi, ''));
            const colMap = {
                nombre: header.findIndex(h => h.includes('nombre') && !h.includes('ap')),
                apellidos: header.findIndex(h => h.includes('apell')),
                telefono: header.findIndex(h => h.includes('tel')) || header.findIndex(h => h.includes('phone')),
                email: header.findIndex(h => h.includes('mail')),
                tipo: header.findIndex(h => h.includes('tipo') || h.includes('temp') || h.includes('calidad')),
                presupuesto: header.findIndex(h => h.includes('presu') || h.includes('budget') || h.includes('precio') || h.includes('valor')),
                fuente: header.findIndex(h => h.includes('fuente') || h.includes('source') || h.includes('origen')),
                empresa: header.findIndex(h => h.includes('empresa') || h.includes('company') || h.includes('compan')),
                notas: header.findIndex(h => h.includes('nota') || h.includes('comment') || h.includes('obs')),
                tipo_negocio: header.findIndex(h => h.includes('negocio') || h.includes('business') || h.includes('sector')),
            };

            if (colMap.nombre < 0) { showCSVResult('err', 'No se encontró la columna "nombre". Revisa las cabeceras del CSV.'); return }

            csvParsed = []; const errors = [];
            const validTipos = ['caliente', 'tibio', 'frio'];

            lines.slice(1).forEach((line, idx) => {
                if (!line.trim()) return;
                const cols = parseCSVLine(line);
                const get = k => colMap[k] >= 0 ? ((cols[colMap[k]] || '').trim()) : '';

                const nombre = get('nombre'); if (!nombre) { errors.push(`Fila ${idx + 2}: sin nombre`); return }
                let tipo = (get('tipo') || 'tibio').toLowerCase();
                if (!validTipos.includes(tipo)) {
                    if (tipo.includes('cali') || tipo.includes('hot')) tipo = 'caliente';
                    else if (tipo.includes('frio') || tipo.includes('cold')) tipo = 'frio';
                    else tipo = 'tibio';
                }
                const presupuesto = parseFloat((get('presupuesto') || '0').replace(/[^\d.,-]/g, '').replace(',', '.')) || 0;
                csvParsed.push({ nombre, apellidos: get('apellidos'), empresa: get('empresa') || '', telefono: get('telefono'), email: get('email'), tipo, tipo_negocio: get('tipo_negocio') || '', presupuesto, fuente: get('fuente'), notas: get('notas') });
            });

            if (!csvParsed.length) { showCSVResult('err', 'No se encontraron filas válidas en el CSV.'); return }

            // Show preview
            const preview = document.getElementById('csv-preview');
            preview.innerHTML = `<table><thead><tr><th>Nombre</th><th>Teléfono</th><th>Tipo</th><th>Presupuesto</th><th>Fuente</th></tr></thead><tbody>
    ${csvParsed.slice(0, 8).map(r => `<tr><td>${r.nombre} ${r.apellidos}</td><td>${r.telefono || '—'}</td><td><span class="badge b-${r.tipo}">${tlabel(r.tipo)}</span></td><td>${fmt(r.presupuesto)}</td><td>${r.fuente || '—'}</td></tr>`).join('')}
    ${csvParsed.length > 8 ? `<tr><td colspan="5" style="text-align:center;color:var(--t3);padding:8px">…y ${csvParsed.length - 8} más</td></tr>` : ''}
  </tbody></table>`;
            document.getElementById('csv-preview-wrap').style.display = 'block';
            document.getElementById('csv-assign-wrap').style.display = 'block';
            document.getElementById('csv-import-btn').style.display = 'inline-flex';

            const msg = errors.length ? `${csvParsed.length} leads listos para importar. ${errors.length} filas ignoradas por errores.` : `${csvParsed.length} leads listos para importar.`;
            showCSVResult(errors.length ? 'warn' : 'ok', msg);
        }

        function parseCSVLine(line) {
            // Handles quoted fields with commas inside
            const result = []; let cur = '', inQ = false;
            for (let i = 0; i < line.length; i++) {
                const ch = line[i];
                if (ch === '"') { inQ = !inQ }
                else if (ch === ',' && !inQ) { result.push(cur); cur = '' }
                else { cur += ch }
            }
            result.push(cur); return result;
        }

        function showCSVResult(type, msg) {
            const el = document.getElementById('csv-result'); if (!el) return;
            el.className = `csv-result ${type}`; el.textContent = msg; el.style.display = 'block';
        }

        /* ── CALENDAR ──────────────────────────────────────────────────── */
        let calYear = new Date().getFullYear();
        let calMonth = new Date().getMonth(); // 0-based

        async function renderCalendar() {
            await loadAllData();
            const isJ = CU.rol === 'jefe';
            setTop('Calendario de Reuniones',
                `<button class="btn btn-primary btn-sm" onclick="openNewReunion()">+ Nueva Reunión</button>`);
            loadingContent();

        function buildCalendarHTML(reuniones, users, closers, isJ) {
            const monthNames = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
            const today = new Date();
            const firstDay = new Date(calYear, calMonth, 1);
            const lastDay  = new Date(calYear, calMonth + 1, 0);
            // Start grid on Monday
            let startDow = firstDay.getDay(); // 0=Sun
            startDow = startDow === 0 ? 6 : startDow - 1; // convert to Mon=0
            const totalCells = Math.ceil((startDow + lastDay.getDate()) / 7) * 7;

            // Build map: date-string → reuniones[]
            const byDate = {};
            reuniones.forEach(r => {
                if (!byDate[r.fecha]) byDate[r.fecha] = [];
                byDate[r.fecha].push(r);
            });

            const dow = ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
            let gridHTML = dow.map(d => `<div class="cal-dow">${d}</div>`).join('');

            for (let i = 0; i < totalCells; i++) {
                const dayOffset = i - startDow;
                const date = new Date(calYear, calMonth, dayOffset + 1);
                const dateStr = date.toISOString().slice(0, 10);
                const isToday = dateStr === today.toISOString().slice(0, 10);
                const isOther = date.getMonth() !== calMonth;
                const dayRs = (byDate[dateStr] || []).sort((a,b) => a.hora.localeCompare(b.hora));

                let eventsHTML = '';
                const maxShow = 3;
                dayRs.slice(0, maxShow).forEach(r => {
                    const closer = users.find(u => u.id === r.closer_id);
                    const bg = closer ? closer.color : '#3b82f6';
                    const name = r.titulo.length > 18 ? r.titulo.slice(0, 17) + '…' : r.titulo;
                    eventsHTML += `<div class="cal-event" style="background:${bg}22;color:${bg};border-left:2px solid ${bg}" data-rid="${r.id}" title="${r.titulo} — ${r.hora}">${r.hora} ${name}</div>`;
                });
                if (dayRs.length > maxShow) {
                    eventsHTML += `<div class="cal-more">+${dayRs.length - maxShow} más</div>`;
                }

                gridHTML += `<div class="cal-day${isToday ? ' today' : ''}${isOther ? ' other-month' : ''}" data-date="${dateStr}">
                    <div class="cal-day-num">${date.getDate()}</div>
                    <div class="cal-events">${eventsHTML}</div>
                </div>`;
            }

            // Legend (jefe only)
            let legendHTML = '';
            if (isJ && closers.length) {
                legendHTML = `<div class="cal-legend">` +
                    closers.map(c => `<div class="cal-leg-item"><div class="cal-leg-dot" style="background:${c.color}"></div>${c.nombre}</div>`).join('') +
                    `</div>`;
            }

            // Upcoming agenda (next 7 days)
            const next7 = [];
            for (let d = 0; d < 14; d++) {
                const dt = new Date(today); dt.setDate(today.getDate() + d);
                const ds = dt.toISOString().slice(0, 10);
                (byDate[ds] || []).forEach(r => next7.push({ ...r, _date: ds }));
            }
            next7.sort((a, b) => a._date.localeCompare(b._date) || a.hora.localeCompare(b.hora));

            let agendaHTML = '';
            if (next7.length) {
                agendaHTML = next7.map(r => {
                    const closer = users.find(u => u.id === r.closer_id);
                    const lead = allL.find(l => l.id === r.lead_id) || null;
                    const col    = closer ? closer.color : '#3b82f6';
                    const dateLabel = r._date === today.toISOString().slice(0,10) ? 'Hoy' :
                                     new Date(r._date + 'T00:00:00').toLocaleDateString('es-ES',{weekday:'short',day:'numeric',month:'short'});
                    return `<div class="agenda-item" onclick="openEditReunion('${r.id}')">
                        <div class="agenda-dot" style="background:${col}"></div>
                        <div style="flex:1;min-width:0">
                            <div class="agenda-title">${r.titulo}</div>
                            <div class="agenda-meta">${dateLabel} · ${r.hora}${r.duracion ? ' · ' + r.duracion + 'min' : ''}${closer && isJ ? ' · ' + closer.nombre : ''}${lead ? ' · ' + lead.nombre + ' ' + (lead.apellidos||'') : ''}</div>
                        </div>
                        <button class="agenda-del" onclick="event.stopPropagation();openGCalById('${r.id}')" title="Abrir en Google Calendar" style="font-size:13px">📅</button>
                        <button class="agenda-del" onclick="event.stopPropagation();deleteReunion('${r.id}')" title="Eliminar">🗑</button>
                    </div>`;
                }).join('');
            } else {
                agendaHTML = '<div class="empty"><div class="ei">📅</div><p>Sin reuniones en los próximos 14 días</p></div>';
            }

            return `
            <div style="display:grid;grid-template-columns:1fr 320px;gap:14px;align-items:start">
              <div class="cal-wrap e1">
                <div class="cal-header">
                  <div class="cal-month-title">${monthNames[calMonth]} ${calYear}</div>
                  <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
                    <button class="btn btn-ghost btn-sm" onclick="calGo(-1)">← Mes anterior</button>
                    <button class="btn btn-ghost btn-sm" onclick="calGoToday()">Hoy</button>
                    <button class="btn btn-ghost btn-sm" onclick="calGo(1)">Mes siguiente →</button>
                  </div>
                </div>
                <div class="cal-grid">${gridHTML}</div>
                ${legendHTML}
              </div>
              <div style="display:flex;flex-direction:column;gap:12px">
                <div class="tc e2">
                  <div class="th"><h3>📋 Próximas reuniones</h3></div>
                  <div style="padding:12px;display:flex;flex-direction:column;gap:7px" id="agenda-list">${agendaHTML}</div>
                </div>
              </div>
            </div>`;
        }

        function bindCalEvents(reuniones, users, isJ) {
            // Click on event pill → edit
            document.querySelectorAll('.cal-event[data-rid]').forEach(el => {
                el.addEventListener('click', ev => {
                    ev.stopPropagation();
                    openEditReunion(el.dataset.rid);
                });
            });
            // Click on day cell → new meeting pre-filled with date
            document.querySelectorAll('.cal-day').forEach(el => {
                el.addEventListener('click', ev => {
                    if (ev.target.closest('.cal-event')) return;
                    openNewReunion(el.dataset.date);
                });
            });
        }

        function calGo(delta) {
            calMonth += delta;
            if (calMonth < 0)  { calMonth = 11; calYear--; }
            if (calMonth > 11) { calMonth = 0;  calYear++; }
            renderCalendar();
        }
        function calGoToday() {
            calYear  = new Date().getFullYear();
            calMonth = new Date().getMonth();
            renderCalendar();
        }

                <div class="fg"><label>Título *</label><input id="rt" placeholder="Ej: Demo con Roberto Fernández"></div>
                <div class="form-row">
                    <div class="fg"><label>Fecha *</label><input type="date" id="rf" value="${today}"></div>
                    <div class="fg"><label>Hora *</label><input type="time" id="rh" value="10:00"></div>
                </div>
                <div class="form-row">
                    <div class="fg"><label>Duración (min)</label><input type="number" id="rd" value="30" min="5" max="480"></div>
                    <div class="fg"><label>Lead relacionado</label>
                        <select id="rl">
                            <option value="">— Ninguno —</option>
                            ${leads.map(l => `<option value="${l.id}">${l.nombre} ${l.apellidos || ''}</option>`).join('')}
                        </select>
                    </div>
                </div>
                ${isJ ? `<div class="fg"><label>Closer asignado *</label>
                    <select id="rc">
                        <option value="">— Selecciona closer —</option>
                        ${closers.map(c => `<option value="${c.id}">${c.nombre}</option>`).join('')}
                    </select>
                </div>` : ''}
                <div class="fg"><label>Notas</label><textarea id="rn" placeholder="Preparación, puntos a tratar…" rows="2"></textarea></div>
            `,
            `<button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
             <button class="btn btn-primary" id="btn-save-r" onclick="saveReunion()">Guardar Reunión</button>`);
        }

        async function saveReunion() {
            const titulo = document.getElementById('rt').value.trim();
            const fecha  = document.getElementById('rf').value;
            const hora   = document.getElementById('rh').value;
            if (!titulo || !fecha || !hora) { showToast('Título, fecha y hora son obligatorios', 'err'); return; }
            const isJ    = CU.rol === 'jefe';
            const closerId = isJ ? (document.getElementById('rc')?.value || null) : CU.id;
            if (isJ && !closerId) { showToast('Selecciona un closer', 'err'); return; }
            const btn = document.getElementById('btn-save-r');
            if (btn) { btn.disabled = true; btn.textContent = 'Guardando…'; }
            const r = {
                id: uid(), titulo, fecha, hora,
                duracion: parseInt(document.getElementById('rd').value) || 30,
                lead_id:  document.getElementById('rl')?.value || null,
                closer_id: closerId,
                notas: document.getElementById('rn').value.trim(),
                created_at: now(), updated_at: now()
            };
            try {
                await sbInsert('reuniones', r);
                const assignedCloser = users.find(u => u.id === closerId);
                log(CU.id, r.lead_id || null, 'reunion',
                    `📅 Nueva reunión <strong>${titulo}</strong> el ${fecha} a las ${hora}${assignedCloser && isJ ? ' → ' + assignedCloser.nombre : ''}`);
                closeModal();
                // Abrir Google Calendar con el evento pre-relleno e invitar al closer por su email
                openInGCal(r);
                showToast('Reunión guardada — Google Calendar abierto para confirmar ✅', 'ok');
                await renderCalendar();
            } catch(err) {
                if (btn) { btn.disabled = false; btn.textContent = 'Guardar Reunión'; }
                showToast(err.message || 'Error al guardar reunión', 'err');
            }
        }

        async function openEditReunion(rid) {
            const r = await sbOne('reuniones', rid);
            if (!r) return;
            const isJ    = CU.rol === 'jefe';
            const canEdit = isJ || r.closer_id === CU.id;
            if (!users.length) await loadAllData();
            const closer = users.find(u => u.id === r.closer_id);
            const leads  = allL;

            openModal(r.titulo, `
                ${canEdit ? `
                <div class="fg"><label>Título *</label><input id="et" value="${r.titulo}"></div>
                <div class="form-row">
                    <div class="fg"><label>Fecha *</label><input type="date" id="ef" value="${r.fecha}"></div>
                    <div class="fg"><label>Hora *</label><input type="time" id="eh" value="${r.hora}"></div>
                </div>
                <div class="form-row">
                    <div class="fg"><label>Duración (min)</label><input type="number" id="ed" value="${r.duracion || 30}" min="5"></div>
                    <div class="fg"><label>Lead relacionado</label>
                        <select id="el">
                            <option value="">— Ninguno —</option>
                            ${leads.map(l => `<option value="${l.id}" ${r.lead_id === l.id ? 'selected' : ''}>${l.nombre} ${l.apellidos || ''}</option>`).join('')}
                        </select>
                    </div>
                </div>
                ${isJ ? `<div class="fg"><label>Closer</label>
                    <select id="ec">
                        <option value="">— Sin asignar —</option>
                        ${closers.map(cc => `<option value="${cc.id}" ${r.closer_id === cc.id ? 'selected' : ''}>${cc.nombre}</option>`).join('')}
                    </select>
                </div>` : `<div class="fg" style="margin-bottom:10px"><div class="it"><div class="itl">Closer</div><div class="itv">${closer ? closer.nombre : '—'}</div></div></div>`}
                <div class="fg"><label>Notas</label><textarea id="en" rows="2">${r.notas || ''}</textarea></div>
                ` : `
                <div class="info-row">
                    <div class="it"><div class="itl">Fecha</div><div class="itv">${r.fecha}</div></div>
                    <div class="it"><div class="itl">Hora</div><div class="itv">${r.hora} · ${r.duracion || 30}min</div></div>
                    <div class="it"><div class="itl">Closer</div><div class="itv">${closer ? closer.nombre : '—'}</div></div>
                </div>
                ${r.notas ? `<div class="fg"><div class="it"><div class="itl">Notas</div><div class="itv">${r.notas}</div></div></div>` : ''}
                `}
            `,
            `<button class="btn btn-ghost" onclick="closeModal()">Cerrar</button>
             ${canEdit ? `<button class="btn btn-red btn-xs" onclick="deleteReunion('${rid}')">🗑 Eliminar</button>
             <button class="btn btn-primary" onclick="updateReunion('${rid}')">Guardar cambios</button>` : ''}`);
        }

        async function updateReunion(rid) {
            const titulo = document.getElementById('et').value.trim();
            const fecha  = document.getElementById('ef').value;
            const hora   = document.getElementById('eh').value;
            if (!titulo || !fecha || !hora) { showToast('Título, fecha y hora obligatorios', 'err'); return; }
            const isJ = CU.rol === 'jefe';
            const patch = {
                titulo,
                fecha,
                hora,
                duracion: parseInt(document.getElementById('ed').value) || 30,
                lead_id:  document.getElementById('el')?.value || null,
                closer_id: isJ ? (document.getElementById('ec')?.value || null) : undefined,
                notas: document.getElementById('en').value.trim(),
            };
            if (!isJ) delete patch.closer_id; // closers can't change assignment
            try {
                await sbUpdate('reuniones', rid, patch);
                // Reabrir Google Calendar con los datos actualizados
                const updatedR = { id: rid, ...patch, closer_id: patch.closer_id ?? undefined };
                openInGCal({ ...updatedR });
                closeModal();
                showToast('Reunión actualizada — Google Calendar abierto para confirmar ✅', 'ok');
                await renderCalendar();
            } catch(e) { showToast(e.message,'err'); }
        }

        async function deleteReunion(rid) {
            if (!confirm('¿Eliminar esta reunión?')) return;
            try {
                await sbDelete('reuniones', rid);
                closeModal();
                showToast('Reunión eliminada');
                await renderCalendar();
            } catch(e) { showToast(e.message,'err'); }
        }


        async function updEmpresa(lid, val) {
            try {
                await sbUpdate('leads', lid, { empresa: val.trim(), updated_at: now() });
                showToast('Empresa actualizada', 'ok');
                await loadAllData();
                if (view === 'leads') refreshLeads();
            } catch(e) { showToast(e.message, 'err'); }
        }
        async function updNegocio(lid, val) {
            try {
                await sbUpdate('leads', lid, { tipo_negocio: val, updated_at: now() });
                showToast('Tipo de negocio actualizado', 'ok');
                await loadAllData();
                if (view === 'leads') refreshLeads();
            } catch(e) { showToast(e.message, 'err'); }
        }
        async function updEst(lid, est) {
            try {
                await sbUpdate('leads', lid, { estado: est, updated_at: now() });
                log(CU.id, lid, 'estado', `Estado actualizado → ${elabel(est)}`);
                showToast(`→ ${elabel(est)}`, 'ok');
                await loadAllData();
                if (view === 'leads') refreshLeads(); else if (view === 'pipeline') renderPipeline();
            } catch(e) { showToast(e.message, 'err'); }
        }
        async function updCl(lid, closerId) {
            try {
                await sbUpdate('leads', lid, { closer_id: closerId || null, updated_at: now() });
                log(CU.id, lid, 'asignado', `Lead reasignado`);
                await loadAllData();
                if (view === 'leads') refreshLeads(); else if (view === 'pipeline') renderPipeline();
            } catch(e) { showToast(e.message, 'err'); }
        }
        function addNota(lid) {
            const txt = document.getElementById('new-nota')?.value?.trim();
            if (!txt) { showToast('Escribe algo en la nota', 'err'); return; }
            const nota = { id: uid(), lead_id: lid, user_id: CU.id, texto: txt, created_at: now() };
            sbInsert('notas_lead', nota).then(() => {
                log(CU.id, lid, 'nota', `Nota añadida al lead`);
                showToast('Nota guardada', 'ok');
                openLeadDetail(lid);
            }).catch(e => showToast(e.message, 'err'));
        }
        function exportCSV() {
            if (!ls.length) { showToast('No hay leads para exportar', 'err'); return; }
            const cols = ['nombre','apellidos','empresa','telefono','email','tipo','tipo_negocio','presupuesto','estado','fuente','notas','created_at'];
            const rows = [cols.join(','), ...ls.map(l => cols.map(k => JSON.stringify(l[k] ?? '')).join(','))];
            const a = document.createElement('a'); a.href = 'data:text/csv;charset=utf-8,\uFEFF' + encodeURIComponent(rows.join('\n'));
            a.download = 'leads_export.csv'; a.click(); showToast('CSV exportado', 'ok');
        }

        function promptEstNote(lid, est) {
            openModal('Conclusiones del cambio de estado', `
                <p style="margin-bottom:13px;color:var(--t2)">Cambiando estado a <strong>${elabel(est)}</strong></p>
                <div class="fg"><label>Conclusiones / notas de la cita</label>
                    <textarea id="est-note" rows="4" placeholder="¿Qué pasó? Conclusiones, próximos pasos, objeciones…"></textarea>
                </div>
            `, '<button class="btn btn-ghost" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="confirmEstNote(\'' + lid + '\',\'' + est + '\')">Guardar</button>');
        }
        async function confirmEstNote(lid, est) {
            const nota = document.getElementById('est-note')?.value?.trim();
            closeModal();
            await updEst(lid, est);
            if (nota) {
                const n = { id: uid(), lead_id: lid, user_id: CU.id, texto: '[' + elabel(est) + '] ' + nota, created_at: now() };
                await sbInsert('notas_lead', n).catch(() => {});
                log(CU.id, lid, 'nota', 'Conclusión: ' + elabel(est));
            }
            setTimeout(() => openLeadDetail(lid), 150);
        }
        async function runOnceCleanup() {
            const key = 'crm_cleanup_contactados_v1';
            if (localStorage.getItem(key)) return;
            try {
                const leads = await sbAll('leads', '&estado=eq.contactado');
                const toDelete = leads.filter(l => {
                    const full = ((l.nombre||'') + ' ' + (l.apellidos||'') + ' ' + (l.empresa||'')).toLowerCase();
                    return !full.includes('llera');
                });
                for (const l of toDelete) { await sbDelete('leads', l.id).catch(() => {}); }
                localStorage.setItem(key, '1');
                if (toDelete.length > 0) showToast(toDelete.length + ' leads eliminados', 'ok');
            } catch(e) { console.warn('cleanup', e); }
        }
        async function toggleDemo(lid, current) {
            try {
                await sbUpdate('leads', lid, { demo_hecha: !current, updated_at: now() });
                showToast(!current ? '✅ Demo marcada como hecha' : 'Demo desmarcada', 'ok');
                await loadAllData();
                if (window.view === 'leads') refreshLeads();
                else if (window.view === 'pipeline') renderPipeline();
            } catch(e) { showToast(e.message, 'err'); }
        }
        /* ── HELPERS ─────────────────────────────────────────────────── */
        function elabel(e) { return { nuevo: '🔵 Nuevo', contactado: '📞 Contactado', no_contesta: '⚠ No contesta', en_proceso: '🔄 Seguimiento', cerrado: '✅ Cerrado', no_interesado: '❌ No interesado' }[e] || e }
        function tlabel(t) { return { caliente: '🔥 Caliente', tibio: '🌡 Tibio', frio: '❄ Frío' }[t] || t }
        function nblabel(t) { return { ecommerce: '🛍 E-commerce', saas: '💻 SaaS', servicios: '🔧 Servicios', retail: '🏪 Retail', inmobiliaria: '🏠 Inmobiliaria', educacion: '📚 Educación', salud: '🏥 Salud', hosteleria: '🍽 Hostelería', consultoria: '💼 Consultoría', otro: '📌 Otro' }[t] || (t ? t : '—') }
        function log(uid_, lid, accion, desc) { sbInsert('actividad', { id: uid(), user_id: uid_, lead_id: lid, accion, descripcion: desc, created_at: now() }).catch(()=>{}); }
        function showToast(msg, type = 'ok') { const c = document.getElementById('toast-c'); const t = document.createElement('div'); t.className = `toast ${type}`; t.textContent = msg; c.appendChild(t); setTimeout(() => { t.classList.add('out'); setTimeout(() => t.remove(), 300) }, 3500) }

        /* ── INIT ────────────────────────────────────────────────────── */
        async function init() {
            const sid = getSession();
            if (sid) {
                try {
                    const res = await sbReq('GET', 'usuarios', null, '?id=eq.' + sid + '&activo=eq.true&limit=1', true);
                    const u = Array.isArray(res) ? res[0] : null;
                    if (u) {
                        CU = u;
                        document.getElementById('login-page').style.display = 'none';
                        startApp();
                        return;
                    }
                } catch(e) { /* network error - fall through to login */ }
                clearSession();
            }
            document.getElementById('login-page').style.display = 'flex';
            document.getElementById('l-pw')?.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
        }
        init();
        </script>
</body>

</html>
